<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンペーン一覧ビルダー｜ぐるっとポン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f5;color:#333;font-size:14px;}
header{background:#fff;border-bottom:2px solid #eb6ea5;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
header .logo{font-size:18px;font-weight:700;color:#eb6ea5;}
header .sub{font-size:12px;color:#999;margin-top:2px;}
.sync-status{font-size:12px;color:#999;display:flex;align-items:center;gap:6px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;}
.sync-dot.ok{background:#4caf50;}
.sync-dot.err{background:#e55;}
.sync-dot.loading{background:#f8de00;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.container{max-width:1100px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start;}
.panel{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;}
.panel-head{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;}
.panel-head h2{font-size:14px;font-weight:700;color:#333;}
.panel-body{padding:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500;}
.field input[type=text],.field input[type=url],.field textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border .15s;}
.field input:focus,.field textarea:focus{border-color:#eb6ea5;}
.field textarea{resize:vertical;min-height:60px;}
.drop-zone{border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa;}
.drop-zone:hover,.drop-zone.drag-over{border-color:#eb6ea5;background:#fff0f7;}
.drop-zone .dz-icon{font-size:28px;margin-bottom:6px;}
.drop-zone .dz-text{font-size:12px;color:#999;}
.drop-zone .dz-fname{font-size:12px;color:#eb6ea5;margin-top:4px;font-weight:500;}
.drop-zone input[type=file]{display:none;}
.drop-zone img.thumb{max-height:80px;border-radius:6px;margin-top:8px;}
.color-row{display:flex;align-items:center;gap:8px;}
.color-row input[type=color]{width:36px;height:36px;border:1px solid #ddd;border-radius:8px;padding:2px;cursor:pointer;background:none;}
.color-row input[type=text]{width:90px;font-family:monospace;font-size:13px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:#eb6ea5;color:#fff;width:100%;justify-content:center;font-size:14px;padding:11px;}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid #ddd;}
.list-empty{padding:32px;text-align:center;color:#bbb;font-size:13px;}
.camp-item{border:1px solid #eee;border-radius:10px;margin:0 12px 10px;overflow:hidden;background:#fff;transition:box-shadow .15s;}
.camp-item.dragging{opacity:.5;}
.camp-item.drag-over-item{border-color:#eb6ea5;box-shadow:0 0 0 2px #eb6ea533;}
.camp-head{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.drag-handle{color:#ccc;font-size:18px;cursor:grab;flex-shrink:0;}
.camp-thumb{width:52px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#f0f0f0;}
.camp-thumb-placeholder{width:52px;height:36px;border-radius:6px;background:#f8de00;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.camp-info{flex:1;min-width:0;}
.camp-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#333;}
.camp-period{font-size:11px;color:#999;margin-top:2px;}
.camp-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid #eee;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.icon-btn:hover{background:#f5f5f5;}
.icon-btn.del:hover{background:#fff0f0;border-color:#fcc;}
.preview-card{border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;background:#fff;}
.preview-card .pc-banner{width:100%;display:block;height:auto;}
.preview-card .pc-banner-placeholder{height:120px;background:#f8de00;display:flex;align-items:center;justify-content:center;font-size:32px;}
.preview-card .pc-body{padding:14px 16px;}
.preview-card .pc-badge{display:inline-block;font-size:12px;font-weight:700;border-radius:4px;padding:3px 10px;margin-bottom:8px;}
.preview-card .pc-title{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:6px;color:#222;}
.preview-card .pc-desc{font-size:13px;color:#666;line-height:1.75;margin-bottom:12px;}
.preview-card .pc-btn{display:block;text-align:center;border-radius:24px;padding:9px;font-size:14px;font-weight:700;text-decoration:none;color:#fff;}
.copy-all-btn{background:#26a8e0;color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
.copy-all-btn:hover{opacity:.85;}
.copy-ok{font-size:12px;color:#2a8a2a;margin-top:6px;text-align:center;display:none;}
.preview-list{display:flex;flex-direction:column;gap:16px;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🎉 キャンペーン一覧ビルダー</div>
    <div class="sub">ぐるっとポン 管理ツール</div>
  </div>
  <div class="sync-status">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-text">読み込み中...</span>
  </div>
</header>

<div class="container">
  <div>
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-head">
        <h2 id="form-title">➕ キャンペーンを追加</h2>
        <button class="btn btn-secondary" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none;font-size:12px;padding:5px 12px;">キャンセル</button>
      </div>
      <div class="panel-body">
        <div class="field">
          <label>バナー画像</label>
          <div class="drop-zone" id="drop-zone" onclick="document.getElementById('f-img-file').click()">
            <div class="dz-icon">🖼️</div>
            <div class="dz-text">クリックまたはドラッグ＆ドロップ</div>
            <div class="dz-fname" id="fname"></div>
            <img id="thumb" class="thumb" style="display:none;">
            <input type="file" id="f-img-file" accept="image/*">
          </div>
        </div>
        <div class="field">
          <label>キャンペーン名</label>
          <input type="text" id="f-title" placeholder="例：リサイクルで夏のご褒美GETキャンペーン">
        </div>
        <div class="field">
          <label>開催期間</label>
          <input type="text" id="f-period" placeholder="例：6/5（金）〜 6/30（火）">
        </div>
        <div class="field">
          <label>説明文</label>
          <textarea id="f-desc" placeholder="例：リサイクルステーションを利用してコインをためると…"></textarea>
        </div>
        <div class="field">
          <label>リンクURL</label>
          <input type="url" id="f-link" placeholder="https://grt-pon.jp/news/detail/XX">
        </div>
        <div class="field">
          <label>期間バッジの色</label>
          <div class="color-row">
            <input type="color" id="c-period-pick" value="#eb6ea5">
            <input type="text" id="c-period-code" value="#eb6ea5" maxlength="7" placeholder="#eb6ea5">
          </div>
        </div>
        <div class="field">
          <label>ボタンの色</label>
          <div class="color-row">
            <input type="color" id="c-btn-pick" value="#eb6ea5">
            <input type="text" id="c-btn-code" value="#eb6ea5" maxlength="7" placeholder="#eb6ea5">
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveItem()">
          <span id="save-btn-label">✅ 追加する</span>
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>📋 登録済みキャンペーン</h2>
        <span id="count-badge" style="font-size:12px;color:#999;">0件</span>
      </div>
      <div id="camp-list" style="padding:12px 0;">
        <div class="list-empty" id="list-empty">まだキャンペーンが登録されていません</div>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="panel-head">
        <h2>👁 プレビュー＆HTML出力</h2>
        <button class="copy-all-btn" onclick="copyAll()">📋 HTMLをまとめてコピー</button>
      </div>
      <div class="panel-body">
        <div class="copy-ok" id="copy-ok">✅ コピーしました！管理画面に貼り付けてください</div>
        <div class="preview-list" id="preview-list">
          <div class="list-empty">左でキャンペーンを追加するとここにプレビューが表示されます</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://grt-campaign-api.k-tochizawa.workers.dev';
let campaigns = [];
let editIndex = -1;
let currentBase64 = '';
let dragSrcIndex = -1;

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + state;
  label.textContent = text;
}

async function loadFromAPI() {
  setSyncStatus('loading', '読み込み中...');
  try {
    const res = await fetch(API);
    campaigns = await res.json();
    setSyncStatus('ok', '同期済み');
    renderAll();
  } catch(e) {
    setSyncStatus('err', '読み込み失敗');
  }
}

async function saveToAPI() {
  setSyncStatus('loading', '保存中...');
  try {
    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(campaigns)
    });
    setSyncStatus('ok', '保存しました');
  } catch(e) {
    setSyncStatus('err', '保存失敗');
  }
}

function isValidHex(v){return /^#[0-9a-fA-F]{6}$/.test(v);}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

function syncColor(pickId,codeId,fromPicker){
  const pick=document.getElementById(pickId),code=document.getElementById(codeId);
  if(fromPicker){code.value=pick.value;}
  else{if(isValidHex(code.value))pick.value=code.value;}
}

document.getElementById('c-period-pick').addEventListener('input',()=>syncColor('c-period-pick','c-period-code',true));
document.getElementById('c-period-code').addEventListener('input',()=>syncColor('c-period-pick','c-period-code',false));
document.getElementById('c-btn-pick').addEventListener('input',()=>syncColor('c-btn-pick','c-btn-code',true));
document.getElementById('c-btn-code').addEventListener('input',()=>syncColor('c-btn-pick','c-btn-code',false));

function loadImage(file){
  document.getElementById('fname').textContent=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    currentBase64=e.target.result;
    const thumb=document.getElementById('thumb');
    thumb.src=currentBase64;
    thumb.style.display='block';
  };
  reader.readAsDataURL(file);
}
document.getElementById('f-img-file').addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0]);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});

async function saveItem(){
  const title=document.getElementById('f-title').value.trim();
  const period=document.getElementById('f-period').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const link=document.getElementById('f-link').value.trim();
  const periodColor=document.getElementById('c-period-pick').value;
  const btnColor=document.getElementById('c-btn-pick').value;
  if(!title){alert('キャンペーン名を入力してください');return;}
  if(!period){alert('開催期間を入力してください');return;}
  const item={title,period,desc,link,periodColor,btnColor,base64:currentBase64};
  if(editIndex>=0){
    if(!currentBase64&&campaigns[editIndex].base64)item.base64=campaigns[editIndex].base64;
    campaigns[editIndex]=item;
    editIndex=-1;
    document.getElementById('form-title').textContent='➕ キャンペーンを追加';
    document.getElementById('save-btn-label').textContent='✅ 追加する';
    document.getElementById('cancel-edit-btn').style.display='none';
  } else {
    campaigns.push(item);
  }
  await saveToAPI();
  renderAll();
  resetForm();
}

function resetForm(){
  document.getElementById('f-title').value='';
  document.getElementById('f-period').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-link').value='';
  document.getElementById('f-img-file').value='';
  document.getElementById('fname').textContent='';
  document.getElementById('thumb').style.display='none';
  document.getElementById('thumb').src='';
  document.getElementById('c-period-pick').value='#eb6ea5';
  document.getElementById('c-period-code').value='#eb6ea5';
  document.getElementById('c-btn-pick').value='#eb6ea5';
  document.getElementById('c-btn-code').value='#eb6ea5';
  currentBase64='';
}

function cancelEdit(){
  editIndex=-1;
  document.getElementById('form-title').textContent='➕ キャンペーンを追加';
  document.getElementById('save-btn-label').textContent='✅ 追加する';
  document.getElementById('cancel-edit-btn').style.display='none';
  resetForm();
}

function editItem(i){
  const c=campaigns[i];
  editIndex=i;
  document.getElementById('f-title').value=c.title;
  document.getElementById('f-period').value=c.period;
  document.getElementById('f-desc').value=c.desc||'';
  document.getElementById('f-link').value=c.link||'';
  document.getElementById('c-period-pick').value=c.periodColor;
  document.getElementById('c-period-code').value=c.periodColor;
  document.getElementById('c-btn-pick').value=c.btnColor;
  document.getElementById('c-btn-code').value=c.btnColor;
  if(c.base64){
    currentBase64=c.base64;
    const thumb=document.getElementById('thumb');
    thumb.src=c.base64;
    thumb.style.display='block';
    document.getElementById('fname').textContent='（登録済み画像）';
  } else {
    currentBase64='';
    document.getElementById('thumb').style.display='none';
    document.getElementById('fname').textContent='';
  }
  document.getElementById('form-title').textContent='✏️ キャンペーンを編集';
  document.getElementById('save-btn-label').textContent='💾 保存する';
  document.getElementById('cancel-edit-btn').style.display='inline-flex';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function deleteItem(i){
  if(!confirm(`「${campaigns[i].title}」を削除しますか？`))return;
  campaigns.splice(i,1);
  await saveToAPI();
  renderAll();
}

function makeCardHTML(c){
  const[r,g,b]=hexToRgb(c.periodColor);
  const badgeBg=`rgba(${r},${g},${b},0.15)`;
  const bannerHtml=c.base64
    ?`<a href="${c.link||'#'}" style="display:block;width:100%;overflow:hidden;line-height:0;"><img src="${c.base64}" alt="${c.title.replace(/"/g,'&quot;')}" style="width:100% !important;max-width:100% !important;display:block !important;height:auto !important;margin:0 !important;padding:0 !important;float:none !important;"></a>`
    :'';
  return `<div style="border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden;background:#fff;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;width:100%;box-sizing:border-box;font-size:0;margin-bottom:1em;">${bannerHtml}<div style="padding:14px 18px 16px;font-size:14px;"><a href="${c.link||'#'}" style="text-decoration:none;"><span style="display:inline-block;font-size:90%;font-weight:700;border-radius:4px;padding:3px 10px;margin-bottom:8px;background:${badgeBg};color:${c.periodColor};">📅 ${c.period}</span><div style="font-size:100%;font-weight:700;color:#222;line-height:1.5;margin-bottom:8px;">${c.title}</div></a><div style="font-size:95%;color:#666;line-height:1.75;margin-bottom:14px;">${c.desc||''}</div><a href="${c.link||'#'}" style="display:block;text-align:center;background:${c.btnColor};color:#fff;border-radius:24px;padding:10px;font-size:100%;font-weight:700;text-decoration:none;">詳しく見る！</a></div></div>`;
}

function renderAll(){
  renderList();
  renderPreviews();
  document.getElementById('count-badge').textContent=`${campaigns.length}件`;
}

function renderList(){
  const el=document.getElementById('camp-list');
  if(campaigns.length===0){
    el.innerHTML='<div class="list-empty" id="list-empty">まだキャンペーンが登録されていません</div>';
    return;
  }
  el.innerHTML='';
  campaigns.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='camp-item';
    div.draggable=true;
    div.dataset.index=i;
    div.innerHTML=`<div class="camp-head"><span class="drag-handle" title="ドラッグで並び替え">⠿</span>${c.base64?`<img class="camp-thumb" src="${c.base64}" alt="">`:`<div class="camp-thumb-placeholder">🎉</div>`}<div class="camp-info"><div class="camp-title">${c.title}</div><div class="camp-period">📅 ${c.period}</div></div><div class="camp-actions"><button class="icon-btn" onclick="editItem(${i})" title="編集">✏️</button><button class="icon-btn del" onclick="deleteItem(${i})" title="削除">🗑️</button></div></div>`;
    div.addEventListener('dragstart',e=>{dragSrcIndex=i;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    div.addEventListener('dragend',()=>{div.classList.remove('dragging');document.querySelectorAll('.camp-item').forEach(el=>el.classList.remove('drag-over-item'));});
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over-item');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over-item'));
    div.addEventListener('drop',async e=>{
      e.preventDefault();
      div.classList.remove('drag-over-item');
      const destIndex=parseInt(div.dataset.index);
      if(dragSrcIndex===destIndex)return;
      const moved=campaigns.splice(dragSrcIndex,1)[0];
      campaigns.splice(destIndex,0,moved);
      await saveToAPI();
      renderAll();
    });
    el.appendChild(div);
  });
}

function renderPreviews(){
  const el=document.getElementById('preview-list');
  if(campaigns.length===0){
    el.innerHTML='<div class="list-empty">左でキャンペーンを追加するとここにプレビューが表示されます</div>';
    return;
  }
  el.innerHTML='';
  campaigns.forEach(c=>{
    const wrap=document.createElement('div');
    wrap.className='preview-card';
    const[r,g,b]=hexToRgb(c.periodColor);
    const badgeBg=`rgba(${r},${g},${b},0.15)`;
    wrap.innerHTML=`${c.base64?`<img class="pc-banner" src="${c.base64}" alt="${c.title}">`:`<div class="pc-banner-placeholder">🎉</div>`}<div class="pc-body"><span class="pc-badge" style="background:${badgeBg};color:${c.periodColor};">📅 ${c.period}</span><div class="pc-title">${c.title}</div><div class="pc-desc">${c.desc||'（説明文なし）'}</div><a class="pc-btn" href="${c.link||'#'}" style="background:${c.btnColor};">詳しく見る！</a></div>`;
    el.appendChild(wrap);
  });
}

function copyAll(){
  if(campaigns.length===0){alert('キャンペーンが登録されていません');return;}
  const html=campaigns.map(c=>makeCardHTML(c)).join('');
  navigator.clipboard.writeText(html).then(()=>{
    const ok=document.getElementById('copy-ok');
    ok.style.display='block';
    setTimeout(()=>ok.style.display='none',3000);
  });
}

loadFromAPI();
</script>
</body>
</html>
